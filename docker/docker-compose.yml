# docker-compose.yml — Iris Discord brain on TrueNAS (or any Docker host).
#
# Usage:
#   1. Copy .env.example to .env and fill in DISCORD_BOT_TOKEN at minimum.
#   2. Make sure the vault path on the left side of the `volumes` mount points
#      at your synced vault (syncthing replica or NFS mount from the Mac).
#   3. Authenticate Claude once before first run:
#        docker compose run --rm iris claude login
#      The token lands in ./claude-auth/ and persists across container restarts.
#   4. `docker compose up -d` to start the bot.

services:
  iris:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: iris-discord:latest
    container_name: iris-discord
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ── Iris core ────────────────────────────────────────────────────────
      IRIS_VAULT_ROOT: /vault
      IRIS_CONFIG:     /vault/.iris-config.toml   # optional: per-vault overrides

      # ── Claude Code CLI auth ─────────────────────────────────────────────
      CLAUDE_CONFIG_DIR: /claude-auth

      # ── Bot ──────────────────────────────────────────────────────────────
      IRIS_DISCORD_MODEL: claude-sonnet-4-6        # change to claude-opus-4 etc.
      # IRIS_DISCORD_ALLOWED_CHANNELS: "123,456"   # optional CSV of channel IDs
      # IRIS_DISCORD_ALLOWED_USERS:    "789,012"   # optional CSV of user IDs
      # IRIS_DISCORD_SYSTEM_PROMPT_PATH: /vault/00_Index/iris_system_prompt.md

      # ── Embeddings / local LLM (optional) ────────────────────────────────
      # If you want semantic search inside the container, point at an Ollama
      # reachable from here. Could be Ollama on the Mac (use the Mac's LAN IP)
      # or a second Ollama container on the same host.
      # IRIS_EMBED_URL:  http://192.168.1.10:11434/v1/embeddings
      # IRIS_LLM_URL:    http://192.168.1.10:11434/v1/chat/completions
      # IRIS_LLM_MODEL:  gemma4

    volumes:
      # ── Vault (THE source of truth — read+write) ─────────────────────────
      # Adjust the left side to wherever the synced vault lives on the host.
      # On TrueNAS SCALE this is typically /mnt/<pool>/<dataset>/AI_Memory.
      - /mnt/tank/vaults/AI_Memory:/vault

      # ── Claude CLI auth (persisted across container restarts) ────────────
      - ./claude-auth:/claude-auth

      # ── Optional: shared MCP config so claude knows about Iris ───────────
      # Already baked into the image via iris_mcp.example.json — only mount
      # this if you want to override per-deployment.
      # - ./settings.json:/claude-auth/settings.json:ro

    # Phase 1 (text) needs no inbound ports. Discord uses outbound WebSocket.
    # Phase 2 (voice) will need either UDP port forwarding or `network_mode: host`.
    # ports:
    #   - "0:0/udp"   # filled in when we add voice

    # Resource hints. The bot itself is tiny; claude CLI is also tiny.
    # If embeddings/LLM run in another container, this one stays small.
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
